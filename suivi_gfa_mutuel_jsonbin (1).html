<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Suivi GFA Mutuel</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#0f1419;--surface:#1a2230;--surface2:#212d3d;--surface3:#263348;
    --border:#2e3f56;--accent:#c5a55a;--accent2:#e8c87a;
    --text:#e8edf4;--text2:#9aaec4;--text3:#6884a0;
    --danger:#e05c5c;--success:#4caf82;--warning:#e0a050;
    --radius:8px;--shadow:0 4px 24px rgba(0,0,0,.4);
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;}
  #app{display:flex;min-height:100vh;}

  /* SIDEBAR */
  #sidebar{width:240px;min-width:240px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;position:fixed;top:0;left:0;height:100vh;z-index:100;}
  .sidebar-logo{padding:24px 20px 20px;border-bottom:1px solid var(--border);}
  .sidebar-logo h1{font-family:'Playfair Display',serif;font-size:16px;font-weight:700;color:var(--accent);line-height:1.3;letter-spacing:.02em;}
  .sidebar-user{padding:16px 20px;border-bottom:1px solid var(--border);}
  .sidebar-user label{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;}
  .sidebar-user select{margin-top:6px;width:100%;background:var(--surface3);border:1px solid var(--border);color:var(--text);padding:7px 10px;border-radius:var(--radius);font-family:'DM Sans',sans-serif;font-size:13px;cursor:pointer;}
  .nav-section{padding:12px 0;flex:1;overflow-y:auto;}
  .nav-label{padding:4px 20px 8px;font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.1em;}
  .nav-item{display:flex;align-items:center;gap:10px;padding:10px 20px;cursor:pointer;color:var(--text2);font-size:13px;transition:all .15s;border-left:2px solid transparent;}
  .nav-item:hover{background:var(--surface2);color:var(--text);}
  .nav-item.active{background:var(--surface2);color:var(--accent);border-left-color:var(--accent);}
  .nav-item svg{width:16px;height:16px;flex-shrink:0;}
  .sidebar-stats{padding:16px 20px;border-top:1px solid var(--border);display:grid;grid-template-columns:1fr 1fr;gap:8px;}
  .stat-mini{background:var(--surface2);border-radius:6px;padding:10px;text-align:center;}
  .stat-mini .val{font-size:20px;font-weight:600;color:var(--accent);}
  .stat-mini .lbl{font-size:10px;color:var(--text3);text-transform:uppercase;margin-top:2px;}

  /* MAIN */
  #main{margin-left:240px;flex:1;display:flex;flex-direction:column;}
  #topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:14px 28px;display:flex;align-items:center;gap:16px;position:sticky;top:0;z-index:50;}
  #topbar h2{font-family:'Playfair Display',serif;font-size:20px;color:var(--text);}
  .topbar-actions{margin-left:auto;display:flex;gap:10px;}
  #content{padding:24px 28px;flex:1;}

  /* BUTTONS */
  .btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:var(--radius);font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;cursor:pointer;border:none;transition:all .15s;}
  .btn-primary{background:var(--accent);color:#1a1a1a;}
  .btn-primary:hover{background:var(--accent2);}
  .btn-secondary{background:var(--surface3);color:var(--text);border:1px solid var(--border);}
  .btn-secondary:hover{background:var(--surface2);border-color:var(--accent);color:var(--accent);}
  .btn-ghost{background:transparent;color:var(--text2);border:1px solid var(--border);}
  .btn-ghost:hover{color:var(--text);border-color:var(--text3);}
  .btn svg{width:14px;height:14px;}
  .icon-btn{width:28px;height:28px;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--text3);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;}
  .icon-btn:hover{background:var(--surface3);color:var(--accent);border-color:var(--accent);}
  .icon-btn svg{width:13px;height:13px;}
  .action-btns{display:flex;gap:6px;}

  /* FILTER / SEARCH */
  .filter-bar{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:20px;align-items:center;}
  .search-box{display:flex;align-items:center;gap:8px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:8px 14px;flex:1;min-width:200px;}
  .search-box svg{color:var(--text3);width:16px;height:16px;flex-shrink:0;}
  .search-box input{background:none;border:none;outline:none;color:var(--text);font-family:'DM Sans',sans-serif;font-size:13px;width:100%;}
  .search-box input::placeholder{color:var(--text3);}
  .filter-select{background:var(--surface);border:1px solid var(--border);color:var(--text);padding:8px 12px;border-radius:var(--radius);font-family:'DM Sans',sans-serif;font-size:13px;cursor:pointer;}

  /* TABLE */
  .table-wrap{overflow-x:auto;border-radius:var(--radius);border:1px solid var(--border);}
  table{width:100%;border-collapse:collapse;font-size:13px;}
  thead tr{background:var(--surface2);}
  th{padding:11px 14px;text-align:left;color:var(--text3);font-weight:500;text-transform:uppercase;font-size:11px;letter-spacing:.06em;border-bottom:1px solid var(--border);white-space:nowrap;cursor:pointer;user-select:none;}
  th:hover{color:var(--text);}
  td{padding:11px 14px;border-bottom:1px solid var(--border);color:var(--text2);vertical-align:middle;}
  tr:last-child td{border-bottom:none;}
  tbody tr{background:var(--surface);transition:background .1s;cursor:pointer;}
  tbody tr:hover{background:var(--surface2);}

  /* BADGES */
  .badge{display:inline-block;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:500;white-space:nowrap;}
  .badge-assoc{background:rgba(74,143,196,.18);color:#7ab8e0;}
  .badge-contact{background:rgba(140,107,206,.18);color:#b497e8;}
  .badge-partner{background:rgba(76,175,130,.18);color:#6dd8a4;}
  .badge-gfa{background:rgba(197,165,90,.18);color:var(--accent);}
  .badge-no{background:rgba(100,100,120,.15);color:var(--text3);}
  .tag-user{display:inline-flex;align-items:center;justify-content:center;width:28px;height:28px;border-radius:50%;font-size:10px;font-weight:600;letter-spacing:.05em;}
  .tag-LDR{background:rgba(74,143,196,.25);color:#7ab8e0;}
  .tag-JLE{background:rgba(140,107,206,.25);color:#b497e8;}
  .tag-AAU{background:rgba(76,175,130,.25);color:#6dd8a4;}

  /* MODAL */
  .modal-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:1000;display:flex;align-items:center;justify-content:center;padding:20px;animation:fadeIn .15s;}
  @keyframes fadeIn{from{opacity:0}to{opacity:1}}
  .modal{background:var(--surface);border:1px solid var(--border);border-radius:12px;width:100%;max-width:760px;max-height:90vh;overflow-y:auto;animation:slideUp .2s ease;box-shadow:var(--shadow);}
  .modal-wide{max-width:980px;}
  @keyframes slideUp{from{transform:translateY(20px);opacity:0}to{transform:none;opacity:1}}
  .modal-header{padding:20px 24px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;}
  .modal-header h3{font-family:'Playfair Display',serif;font-size:18px;flex:1;}
  .modal-close{width:30px;height:30px;border-radius:6px;background:transparent;border:1px solid var(--border);color:var(--text2);cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;transition:all .15s;}
  .modal-close:hover{background:var(--surface3);color:var(--danger);border-color:var(--danger);}
  .modal-body{padding:24px;}
  .modal-footer{padding:16px 24px;border-top:1px solid var(--border);display:flex;gap:10px;justify-content:flex-end;}

  /* FORM */
  .form-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
  .form-grid.cols3{grid-template-columns:1fr 1fr 1fr;}
  .form-full{grid-column:1/-1;}
  .field{display:flex;flex-direction:column;gap:6px;}
  .field label{font-size:12px;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;}
  .field input,.field select,.field textarea{background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:9px 12px;border-radius:var(--radius);font-family:'DM Sans',sans-serif;font-size:13px;transition:border-color .15s;outline:none;}
  .field input:focus,.field select:focus,.field textarea:focus{border-color:var(--accent);}
  .field textarea{resize:vertical;min-height:80px;}
  .section-title{font-size:11px;text-transform:uppercase;letter-spacing:.1em;color:var(--accent);margin:20px 0 12px;padding-bottom:6px;border-bottom:1px solid var(--border);}

  /* DETAIL */
  .detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:24px;}
  .detail-row{display:flex;align-items:flex-start;padding:8px 0;border-bottom:1px solid var(--border);gap:12px;}
  .detail-row:last-child{border-bottom:none;}
  .detail-key{font-size:12px;color:var(--text3);min-width:160px;flex-shrink:0;}
  .detail-val{font-size:13px;color:var(--text);}

  /* TABS */
  .tabs{display:flex;gap:0;border-bottom:1px solid var(--border);margin-bottom:20px;}
  .tab{padding:10px 18px;cursor:pointer;font-size:13px;color:var(--text3);border-bottom:2px solid transparent;transition:all .15s;white-space:nowrap;}
  .tab:hover{color:var(--text);}
  .tab.active{color:var(--accent);border-bottom-color:var(--accent);}

  /* COMM items */
  .comm-item{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;margin-bottom:10px;cursor:pointer;transition:border-color .15s;}
  .comm-item:hover{border-color:var(--accent);}
  .comm-header{display:flex;gap:10px;align-items:center;margin-bottom:6px;}
  .comm-type{width:28px;height:28px;border-radius:6px;flex-shrink:0;display:flex;align-items:center;justify-content:center;}
  .comm-type-email{background:rgba(74,143,196,.2);color:#7ab8e0;}
  .comm-type-call{background:rgba(76,175,130,.2);color:#6dd8a4;}
  .comm-type-meeting{background:rgba(197,165,90,.2);color:var(--accent);}
  .comm-type-note{background:rgba(140,107,206,.2);color:#b497e8;}
  .comm-meta{flex:1;}
  .comm-subject{font-size:13px;font-weight:500;color:var(--text);}
  .comm-date{font-size:11px;color:var(--text3);margin-top:2px;}
  .comm-preview{font-size:12px;color:var(--text3);line-height:1.5;}
  .email-full{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);padding:16px;font-size:13px;color:var(--text2);line-height:1.7;white-space:pre-wrap;font-family:'DM Sans',sans-serif;margin-top:10px;}

  /* RELATIONS */
  .relation-item{display:flex;align-items:center;gap:12px;padding:10px 14px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:8px;cursor:pointer;transition:border-color .15s;}
  .relation-item:hover{border-color:var(--accent);}
  .relation-type{font-size:11px;color:var(--text3);min-width:80px;}
  .relation-name{font-size:13px;color:var(--text);font-weight:500;}

  /* DASHBOARD */
  .dash-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:24px;}
  .dash-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px;}
  .dash-card .val{font-size:32px;font-weight:700;color:var(--accent);font-family:'Playfair Display',serif;}
  .dash-card .lbl{font-size:12px;color:var(--text3);margin-top:4px;text-transform:uppercase;letter-spacing:.06em;}
  .dash-card .sub{font-size:12px;color:var(--success);margin-top:6px;}
  .dash-row{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
  .dash-panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px;}
  .dash-panel h4{font-size:12px;text-transform:uppercase;letter-spacing:.08em;color:var(--text3);margin-bottom:16px;}
  .progress-bar{height:6px;background:var(--surface3);border-radius:3px;margin-top:6px;}
  .progress-fill{height:100%;border-radius:3px;transition:width .5s ease;}
  .recent-item{display:flex;align-items:center;gap:12px;padding:8px 0;border-bottom:1px solid var(--border);}
  .recent-item:last-child{border-bottom:none;}

  /* COMMUNICATION SECTION — champs structurés */
  .comm-fields-panel{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-bottom:20px;}
  .comm-fields-header{padding:12px 16px;background:var(--surface3);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
  .comm-fields-header span{font-size:11px;text-transform:uppercase;letter-spacing:.1em;color:var(--accent);}
  .comm-field-row{display:flex;align-items:center;gap:0;border-bottom:1px solid var(--border);}
  .comm-field-row:last-child{border-bottom:none;}
  .comm-field-key{padding:10px 16px;font-size:12px;color:var(--text3);min-width:220px;flex-shrink:0;border-right:1px solid var(--border);background:var(--surface);}
  .comm-field-key .field-meta{font-size:10px;color:var(--text3);opacity:.6;margin-top:2px;}
  .comm-field-val{padding:10px 16px;font-size:13px;color:var(--text);flex:1;}
  .comm-field-fixed{background:rgba(197,165,90,.05);}

  /* CUSTOM FIELDS manager */
  .cf-item{display:flex;align-items:center;gap:12px;padding:10px 16px;border-bottom:1px solid var(--border);background:var(--surface);}
  .cf-item:last-child{border-bottom:none;}
  .cf-item-label{flex:1;font-size:13px;color:var(--text);}
  .cf-item-meta{font-size:11px;color:var(--text3);}
  .cf-fixed-badge{font-size:10px;padding:2px 8px;border-radius:10px;background:rgba(197,165,90,.15);color:var(--accent);margin-left:6px;}

  /* TOAST */
  .toast{position:fixed;bottom:24px;right:24px;z-index:9999;background:var(--surface3);border:1px solid var(--border);padding:12px 18px;border-radius:var(--radius);font-size:13px;color:var(--text);box-shadow:var(--shadow);animation:slideUp .2s ease;display:flex;align-items:center;gap:10px;}
  .toast-success{border-left:3px solid var(--success);}
  .toast-error{border-left:3px solid var(--danger);}

  .empty-state{text-align:center;padding:60px 20px;color:var(--text3);font-size:14px;}
  .empty-state svg{width:48px;height:48px;margin-bottom:16px;opacity:.3;display:block;margin-left:auto;margin-right:auto;}
  select option{background:#1a2230;}
  .nfc-dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:4px;}
  .nfc-interested{background:var(--success);}
  .nfc-not{background:var(--danger);}
  .nfc-nc{background:var(--text3);}
</style>
</head>
<body>
<div id="app">
  <nav id="sidebar">
    <div class="sidebar-logo">
      <div style="font-size:11px;color:var(--text3);letter-spacing:.12em;text-transform:uppercase;margin-bottom:4px;">CRM</div>
      <h1>Suivi GFA Mutuel</h1>
    </div>
    <div class="sidebar-user">
      <label>Utilisateur connecté</label>
      <select id="currentUserSelect" onchange="setCurrentUser(this.value)">
        <option value="LDR">LDR</option>
        <option value="JLE">JLE</option>
        <option value="AAU">AAU</option>
      </select>
    </div>
    <div class="nav-section">
      <div class="nav-label">Navigation</div>
      <div class="nav-item active" onclick="showPage('dashboard')" id="nav-dashboard">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
        Tableau de bord
      </div>
      <div class="nav-item" onclick="showPage('contacts')" id="nav-contacts">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
        Contacts
      </div>
      <div class="nav-item" onclick="showPage('echanges')" id="nav-echanges">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
        Échanges
      </div>
      <div class="nav-item" onclick="showPage('gfa-normandie')" id="nav-gfa-normandie">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9,22 9,12 15,12 15,22"/></svg>
        GFA Normandie
      </div>
      <div class="nav-label" style="margin-top:8px;">Paramètres</div>
      <div class="nav-item" onclick="showPage('champs-comm')" id="nav-champs-comm">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
        Champs communication
      </div>
    </div>
    <div class="sidebar-stats" id="sidebar-stats"></div>
  </nav>

  <div id="main">
    <div id="topbar">
      <h2 id="topbar-title">Tableau de bord</h2>
      <div class="topbar-actions" id="topbar-actions"></div>
    </div>
    <div id="content"></div>
  </div>
</div>

<div id="modal-container"></div>
<div id="toast-container"></div>

<script>
// ─────────────────────────────────────────────
// STATE
// ─────────────────────────────────────────────
let currentUser = 'LDR';
let currentPage = 'dashboard';
let contacts = [];
let echanges = [];
// commFields : champs de la section "Communication" affichés sur chaque fiche contact.
// Les champs fixes sont marqués fixed:true et ne peuvent pas être supprimés.
let commFields = [];
let sortField = 'nom';
let sortDir = 1;
let searchQuery = '';
let filterStatut = '';
let filterContact = '';

// ─────────────────────────────────────────────
// JSONBIN — STORAGE
// ─────────────────────────────────────────────
const JSONBIN_ID  = '69c3a823b7ec241ddc9f6c53';
const JSONBIN_KEY = '$2a$10$zumebLzV6/IV7JaU62lSvORWqTO4AB16THuMxD5zu258UmyG/G5Dm';
const JSONBIN_URL = `https://api.jsonbin.io/v3/b/${JSONBIN_ID}`;

async function loadData() {
  showLoader('Chargement des données…');
  try {
    const r = await fetch(JSONBIN_URL + '/latest', {
      headers: { 'X-Master-Key': JSONBIN_KEY }
    });
    if (!r.ok) throw new Error('HTTP ' + r.status);
    const json = await r.json();
    const d = json.record;
    contacts    = (d.contacts    && d.contacts.length)    ? d.contacts    : defaultContacts();
    echanges    = (d.echanges    && d.echanges.length)    ? d.echanges    : defaultEchanges();
    commFields  = (d.commFields  && d.commFields.length)  ? d.commFields  : defaultCommFields();
  } catch(e) {
    console.error('JSONBin loadData error:', e);
    contacts   = defaultContacts();
    echanges   = defaultEchanges();
    commFields = defaultCommFields();
    showToast('Impossible de charger les données en ligne — mode local activé', 'error');
  }
  hideLoader();
}

async function saveAll() {
  try {
    const r = await fetch(JSONBIN_URL, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json', 'X-Master-Key': JSONBIN_KEY },
      body: JSON.stringify({ contacts, echanges, commFields })
    });
    if (!r.ok) throw new Error('HTTP ' + r.status);
  } catch(e) {
    console.error('JSONBin saveAll error:', e);
    showToast('Erreur de sauvegarde', 'error');
  }
}

async function saveContacts()   { await saveAll(); }
async function saveEchanges()   { await saveAll(); }
async function saveCommFields() { await saveAll(); }

// ─────────────────────────────────────────────
// LOADER
// ─────────────────────────────────────────────
function showLoader(msg) {
  let el = document.getElementById('gfam-loader');
  if (!el) {
    el = document.createElement('div');
    el.id = 'gfam-loader';
    el.style.cssText = 'position:fixed;inset:0;background:rgba(15,20,25,.75);z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;';
    el.innerHTML = '<div style="width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite"></div><div style="font-size:13px;color:var(--text2)" id="loader-msg"></div><style>@keyframes spin{to{transform:rotate(360deg)}}</style>';
    document.body.appendChild(el);
  }
  document.getElementById('loader-msg').textContent = msg || '';
  el.style.display = 'flex';
}
function hideLoader() {
  const el = document.getElementById('gfam-loader');
  if (el) el.style.display = 'none';
}

// ─────────────────────────────────────────────
// DEFAULTS
// ─────────────────────────────────────────────
function defaultCommFields() {
  return [
    { id:'cf_gfa_norm', label:'Liste GFA Normandie', type:'yesno', fixed:true, auteur:'système', date:'2025-01-01', desc:'OUI / NON' },

// ─────────────────────────────────────────────
// UTILS
// ─────────────────────────────────────────────
function genId() { return Date.now() + Math.floor(Math.random()*10000); }
function fmtDate(d) { if(!d) return '—'; const dt=new Date(d); return dt.toLocaleDateString('fr-FR',{day:'2-digit',month:'2-digit',year:'numeric'}); }
function daysAgo(d) {
  if(!d) return '';
  const diff = Math.floor((Date.now()-new Date(d))/86400000);
  if(diff===0) return "Aujourd'hui"; if(diff===1) return 'Hier'; return `Il y a ${diff} j`;
}
function getContact(id) { return contacts.find(c=>c.id===id); }
function showToast(msg,type='success') {
  const t=document.createElement('div');
  t.className=`toast toast-${type}`;
  t.innerHTML=`<span>${type==='success'?'✓':'✗'}</span>${msg}`;
  document.getElementById('toast-container').appendChild(t);
  setTimeout(()=>t.remove(),3000);
}
function setCurrentUser(u) { currentUser=u; render(); }
function renderFieldValue(field, val) {
  if(!val && val!==0) return '<span style="color:var(--text3)">—</span>';
  if(field.type==='yesno') return val==='OUI' ? '<span class="badge badge-gfa">OUI</span>' : '<span class="badge badge-no">NON</span>';
  if(field.type==='user') return val ? `<span class="tag-user tag-${val}" style="width:auto;height:auto;padding:2px 8px;border-radius:4px;">${val}</span>` : '<span style="color:var(--text3)">—</span>';
  if(field.type==='date') return fmtDate(val);
  return `<span style="color:var(--text)">${val}</span>`;
}
function getCommVal(contact, fieldId) {
  return contact.commValues ? (contact.commValues[fieldId] ?? '') : '';
}

function renderContacts() {
  let filtered=contacts.filter(c=>{
    const q=searchQuery.toLowerCase();
    const match=!q||c.nom.toLowerCase().includes(q)||c.prenom.toLowerCase().includes(q)||c.email.toLowerCase().includes(q)||c.ville.toLowerCase().includes(q)||c.telephone.includes(q);
    return match && (!filterStatut||c.statut===filterStatut) && (!filterContact||c.contactPrincipal===filterContact);
  });
  filtered.sort((a,b)=>{
    const va=(a[sortField]||'').toLowerCase(); const vb=(b[sortField]||'').toLowerCase();
    return va<vb?-sortDir:va>vb?sortDir:0;
  });

  // Show the first 2 non-fixed comm fields as extra columns
  const extraCols = commFields.filter(f=>!f.fixed).slice(0,2);

  document.getElementById('content').innerHTML=`
    <div class="filter-bar">
      <div class="search-box">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <input type="text" placeholder="Rechercher…" value="${searchQuery}" oninput="searchQuery=this.value;renderContacts()">
      </div>
      <select class="filter-select" onchange="filterStatut=this.value;renderContacts()">
        <option value="">Tous statuts</option>
        <option value="associe" ${filterStatut==='associe'?'selected':''}>Associés</option>
        <option value="contact" ${filterStatut==='contact'?'selected':''}>Contacts</option>
        <option value="partenaire" ${filterStatut==='partenaire'?'selected':''}>Partenaires</option>
      </select>
      <select class="filter-select" onchange="filterContact=this.value;renderContacts()">
        <option value="">Tous — Agristella</option>
        ${['LDR','JLE','AAU'].map(u=>`<option value="${u}" ${filterContact===u?'selected':''}>${u}</option>`).join('')}
      </select>
      <span style="margin-left:auto;font-size:12px;color:var(--text3)">${filtered.length} résultat(s)</span>
    </div>
    <div class="table-wrap">
      <table>
        <thead><tr>
          <th onclick="setSortField('nom')">Nom ${sortField==='nom'?(sortDir===1?'↑':'↓'):'⇅'}</th>
          <th onclick="setSortField('statut')">Statut</th>
          <th>Contact Agristella</th>
          <th>GFA Normandie</th>
          <th>Dernier échange</th>
          ${extraCols.map(f=>`<th>${f.label}</th>`).join('')}
          <th>Relations</th>
          <th></th>
        </tr></thead>
        <tbody>
          ${filtered.length===0?`<tr><td colspan="${7+extraCols.length}"><div class="empty-state">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>
            <div>Aucun contact trouvé</div></div></td></tr>`:
          filtered.map(c=>{
            const statBadge=c.statut==='associe'?'<span class="badge badge-assoc">Associé</span>':c.statut==='contact'?'<span class="badge badge-contact">Contact</span>':'<span class="badge badge-partner">Partenaire</span>';
            const nfcDot=c.precisionStatut==='Intéressé'?'<span class="nfc-dot nfc-interested"></span>':c.precisionStatut==='Non Intéressé'?'<span class="nfc-dot nfc-not"></span>':c.precisionStatut==='NC'?'<span class="nfc-dot nfc-nc"></span>':'';
            const gfaNorm=getCommVal(c,'cf_gfa_norm');
            const lastDate=getCommVal(c,'cf_last_date');
            const relCount=(c.relations||[]).length;
            return `<tr onclick="openContactDetail(${c.id})">
              <td><div style="font-weight:500;color:var(--text)">${c.civilite} ${c.prenom} ${c.nom}</div><div style="font-size:11px;color:var(--text3)">${c.email||''}</div></td>

              <td style="font-size:12px;color:var(--text3)">${fmtDate(lastDate)}<br><span style="font-size:11px">${daysAgo(lastDate)}</span></td>
              ${extraCols.map(f=>`<td style="font-size:12px">${renderFieldValue(f, getCommVal(c,f.id))}</td>`).join('')}

                </button>
              </div></td>
            </tr>`;
          }).join('')}
        </tbody>
      </table>
    </div>`;
}

function setSortField(f) { if(sortField===f) sortDir*=-1; else{sortField=f;sortDir=1;} renderContacts(); }

function openContactDetail(id) {
  const c=getContact(id);

  ces.sort((a,b)=>b.date.localeCompare(a.date));

  // Communication fields panel

            <div class="detail-row"><div class="detail-key">CP / Ville</div><div class="detail-val">${c.cp||''} ${c.ville||''}</div></div>
          </div>
          <div>
            <div class="section-title">GFA Mutuel</div>
            <div class="detail-row"><div class="detail-key">Contact principal</div><div class="detail-val"><span class="tag-user tag-${c.contactPrincipal}">${c.contactPrincipal}</span></div></div>

function openContactModal(id, goToCommTab) {
  const c=id?getContact(id):null;
  const otherContacts=contacts.filter(x=>x.id!==(c?c.id:-1));
  const relTypeOptions=['Conjoint(e)','Enfant','Parent','Frère/Sœur','Associé(e)','Autre'];
  const existingRels=(c&&c.relations)||[];

  // Comm fields inputs for this contact
  const commFieldsInputs=commFields.map(f=>{
    const val=c?getCommVal(c,f.id):'';
    let input='';
    if(f.type==='yesno') input=`<select id="cf_${f.id}"><option value="NON" ${val!=='OUI'?'selected':''}>NON</option><option value="OUI" ${val==='OUI'?'selected':''}>OUI</option></select>`;
    else if(f.type==='user') input=`<select id="cf_${f.id}"><option value="">— Même que contact principal —</option>${['LDR','JLE','AAU'].map(u=>`<option ${val===u?'selected':''}>${u}</option>`).join('')}</select>`;
    else if(f.type==='date') input=`<input id="cf_${f.id}" type="date" value="${val}">`;
    else if(f.type==='number') input=`<input id="cf_${f.id}" type="number" value="${val}">`;
    else if(f.type==='url') input=`<input id="cf_${f.id}" type="url" value="${val}" placeholder="https://…">`;
    else input=`<input id="cf_${f.id}" type="text" value="${val}" placeholder="${f.desc||''}">`;
    return `<div class="field"><label>${f.label}${f.fixed?'<span class="cf-fixed-badge" style="margin-left:6px">fixe</span>':''}</label>${input}</div>`;
  }).join('');

  const html=`
    <div class="modal-header">
      <h3>${c?'Modifier le contact':'Nouveau contact'}</h3>
      <button class="modal-close" onclick="closeModal()">×</button>
    </div>
    <div class="modal-body">
      <div class="tabs" id="edit-tabs">
        <div class="tab ${!goToCommTab?'active':''}" onclick="switchEditTab('identite',this)">Identité & coordonnées</div>
        <div class="tab ${goToCommTab?'active':''}" onclick="switchEditTab('comm',this)">Communication</div>
        <div class="tab" onclick="switchEditTab('relations',this)">Relations</div>
      </div>

      <!-- IDENTITE -->
      <div id="etab-identite" style="${goToCommTab?'display:none':''}">
        <div class="section-title">Identité</div>
        <div class="form-grid cols3">
          <div class="field"><label>Civilité *</label>
            <select id="f_civilite">
              <option ${c&&c.civilite==='M.'?'selected':''}>M.</option>
              <option ${c&&c.civilite==='Mme'?'selected':''}>Mme</option>
              <option ${c&&c.civilite==='M. et Mme'?'selected':''}>M. et Mme</option>
            </select>
          </div>
          <div class="field"><label>Nom *</label><input id="f_nom" value="${c?c.nom:''}" placeholder="Nom de famille"></div>
          <div class="field"><label>Prénom *</label><input id="f_prenom" value="${c?c.prenom:''}" placeholder="Prénom"></div>
        </div>
        <div class="section-title">Coordonnées</div>
        <div class="form-grid">
          <div class="field"><label>E-mail</label><input id="f_email" type="email" value="${c?c.email:''}" placeholder="email@domaine.fr"></div>
          <div class="field"><label>Téléphone</label><input id="f_telephone" value="${c?c.telephone:''}" placeholder="06 00 00 00 00"></div>
          <div class="field form-full"><label>Adresse</label><input id="f_adresse" value="${c?c.adresse:''}" placeholder="Numéro et rue"></div>
          <div class="field"><label>Code postal</label><input id="f_cp" value="${c?c.cp:''}" placeholder="75000"></div>
          <div class="field"><label>Ville</label><input id="f_ville" value="${c?c.ville:''}" placeholder="Ville"></div>
        </div>
        <div class="section-title">GFA Mutuel</div>
        <div class="form-grid">
          <div class="field"><label>Contact principal Agristella *</label>
            <select id="f_contactPrincipal">
              ${['LDR','JLE','AAU'].map(u=>`<option ${c&&c.contactPrincipal===u?'selected':''}>${u}</option>`).join('')}
            </select>
          </div>
          <div class="field"><label>Statut *</label>
            <select id="f_statut" onchange="updatePrecision()">
              <option value="associe" ${c&&c.statut==='associe'?'selected':''}>Associé</option>
              <option value="contact" ${c&&c.statut==='contact'?'selected':''}>Contact</option>
              <option value="partenaire" ${c&&c.statut==='partenaire'?'selected':''}>Partenaire</option>
            </select>
          </div>
          <div class="field"><label>Précision statut</label><select id="f_precisionStatut"></select></div>
        </div>
        <div class="section-title">Notes</div>
        <div class="field"><textarea id="f_notes" placeholder="Notes libres…">${c?c.notes:''}</textarea></div>
      </div>

      <!-- COMMUNICATION -->
      <div id="etab-comm" style="${goToCommTab?'':'display:none'}">
        <div style="margin-bottom:14px;font-size:12px;color:var(--text3)">Renseignez ici les champs de la section Communication pour ce contact. Pour ajouter ou supprimer des champs, allez dans <a href="#" onclick="closeModal();showPage('champs-comm')" style="color:var(--accent)">Champs — Section Communication</a>.</div>
        <div class="form-grid">
          ${commFieldsInputs}
        </div>
      </div>

      <!-- RELATIONS -->
      <div id="etab-relations" style="display:none">
        <div id="relations-list">
          ${existingRels.map((r,i)=>`
            <div class="form-grid" style="margin-bottom:8px">
              <div class="field"><label>Type de lien</label>
                <select class="rel-type">${relTypeOptions.map(t=>`<option ${r.type===t?'selected':''}>${t}</option>`).join('')}</select>
              </div>
              <div class="field"><label>Contact lié</label>
                <select class="rel-contact">
                  <option value="">— Choisir —</option>
                  ${otherContacts.map(oc=>`<option value="${oc.id}" ${r.contactId===oc.id?'selected':''}>${oc.prenom} ${oc.nom}</option>`).join('')}

              </div>
            </div>`).join('')}

      <button class="btn btn-ghost" onclick="closeModal()">Annuler</button>
      <button class="btn btn-primary" onclick="saveContact(${id||0})">${c?'Enregistrer':'Créer le contact'}</button>
    </div>`;
  openModal(html,'modal-wide');
  setTimeout(()=>{ updatePrecision(c?c.precisionStatut:''); },50);
}

function switchEditTab(tab,el) {
  document.querySelectorAll('#edit-tabs .tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  ['identite','comm','relations'].forEach(t=>{
    const d=document.getElementById('etab-'+t); if(d) d.style.display=t===tab?'block':'none';
  });
}

function updatePrecision(preset) {
  const statut=document.getElementById('f_statut')?.value;
  const sel=document.getElementById('f_precisionStatut');
  if(!sel) return;
  let opts=[];
  if(statut==='contact') opts=['Intéressé','Non Intéressé','NC'];
  else if(statut==='associe') opts=['ASSOCIE GFAM BOISCHAUT','ASSOCIE GFAM BOISCHAUT ET NORMANDIE','ASSOCIE GFAM NORMANDIE'];
  else opts=['—'];
  sel.innerHTML=opts.map(o=>`<option ${preset&&preset===o?'selected':''}>${o}</option>`).join('');
}

function addRelationRow(currentId) {
  const otherContacts=contacts.filter(x=>x.id!==currentId);
  const relTypeOptions=['Conjoint(e)','Enfant','Parent','Frère/Sœur','Associé(e)','Autre'];
  const div=document.createElement('div');
  div.className='form-grid'; div.style.marginBottom='8px';
  div.innerHTML=`
    <div class="field"><label>Type de lien</label><select class="rel-type">${relTypeOptions.map(t=>`<option>${t}</option>`).join('')}</select></div>
    <div class="field"><label>Contact lié</label>
      <select class="rel-contact"><option value="">— Choisir —</option>
        ${otherContacts.map(oc=>`<option value="${oc.id}">${oc.prenom} ${oc.nom}</option>`).join('')}
      </select>
    </div>`;
  document.getElementById('relations-list').appendChild(div);
}

async function saveContact(id) {
  const nom=document.getElementById('f_nom')?.value.trim()||'';
  const prenom=document.getElementById('f_prenom')?.value.trim()||'';
  if(!nom||!prenom){showToast('Nom et prénom obligatoires','error');return;}

  const relations=[];
  document.querySelectorAll('.rel-type').forEach((sel,i)=>{
    const cSel=document.querySelectorAll('.rel-contact')[i];
    if(cSel&&cSel.value) relations.push({type:sel.value,contactId:parseInt(cSel.value)});
  });

  const commValues={};
  commFields.forEach(f=>{
    const el=document.getElementById('cf_'+f.id);
    if(el) commValues[f.id]=el.value;
  });

  // If cf_last_date not manually set and creating, default today
  if(!commValues['cf_last_date']) commValues['cf_last_date']=new Date().toISOString().split('T')[0];

  const data={
    civilite:document.getElementById('f_civilite')?.value||'M.',
    nom,prenom,
    email:document.getElementById('f_email')?.value.trim()||'',
    telephone:document.getElementById('f_telephone')?.value.trim()||'',
    adresse:document.getElementById('f_adresse')?.value.trim()||'',
    cp:document.getElementById('f_cp')?.value.trim()||'',
    ville:document.getElementById('f_ville')?.value.trim()||'',
    contactPrincipal:document.getElementById('f_contactPrincipal')?.value||'LDR',
    statut:document.getElementById('f_statut')?.value||'contact',
    precisionStatut:document.getElementById('f_precisionStatut')?.value||'',
    notes:document.getElementById('f_notes')?.value||'',
    relations,commValues
  };

  if(id) {
    const idx=contacts.findIndex(c=>c.id===id);
    contacts[idx]={...contacts[idx],...data};
    showToast('Contact mis à jour');
  } else {
    data.id=genId();
    contacts.push(data);
    showToast('Contact créé');
  }
  await saveContacts();
  closeModal();
  render();
}

async function deleteContact(id) {
  if(!confirm('Supprimer ce contact ?')) return;
  contacts=contacts.filter(c=>c.id!==id);
  await saveContacts();
  showToast('Contact supprimé');
  render();
}

function renderEchanges() {
  const q=searchQuery.toLowerCase();
  let filtered=echanges.filter(e=>{
    const c=getContact(e.contactId);
    return !q||(c&&(c.nom.toLowerCase().includes(q)||c.prenom.toLowerCase().includes(q)))||e.sujet.toLowerCase().includes(q)||e.corps.toLowerCase().includes(q);
  });
  filtered.sort((a,b)=>b.date.localeCompare(a.date));
  const typeLabels={email:'E-mail',call:'Appel',meeting:'Réunion',note:'Note'};
  const typeIcons={email:'✉',call:'☎',meeting:'⊙',note:'✎'};

  document.getElementById('content').innerHTML=`
    <div class="filter-bar">
      <div class="search-box">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <input type="text" placeholder="Rechercher dans les échanges…" value="${searchQuery}" oninput="searchQuery=this.value;renderEchanges()">
      </div>
      <span style="margin-left:auto;font-size:12px;color:var(--text3)">${filtered.length} échange(s)</span>
    </div>
    ${filtered.length===0?`<div class="empty-state">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
      <div>Aucun échange trouvé</div></div>`:
    filtered.map(e=>{
      const c=getContact(e.contactId);
      return `<div class="comm-item" onclick="openEchangeDetail(${e.id})">
        <div class="comm-header">
          <div class="comm-type comm-type-${e.type}">${typeIcons[e.type]||'•'}</div>
          <div class="comm-meta">
            <div class="comm-subject">${e.sujet}</div>
            <div class="comm-date">${typeLabels[e.type]||e.type} · ${fmtDate(e.date)} · <span class="tag-user tag-${e.auteur}" style="width:auto;height:auto;padding:1px 6px;border-radius:3px;font-size:10px">${e.auteur}</span>${c?` · ${c.prenom} ${c.nom}`:''}</div>
          </div>
          <div onclick="event.stopPropagation()">
            <button class="icon-btn" style="color:var(--danger)" onclick="deleteEchange(${e.id})">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/></svg>
            </button>
          </div>
        </div>
        <div class="comm-preview">${(e.corps||'').substring(0,200)}${e.corps&&e.corps.length>200?'…':''}</div>
      </div>`;
    }).join('')}`;
}

  const html=`

      <button class="modal-close" onclick="closeModal()">×</button>

function toggleCC() {
  const t=document.getElementById('em_type')?.value;
  const f=document.getElementById('field_cc');
  if(f) f.style.display=t==='email'?'block':'none';
}

async function saveEchange() {
  const contactId=parseInt(document.getElementById('em_contactId').value);
  const sujet=document.getElementById('em_sujet').value.trim();
  const date=document.getElementById('em_date').value;
  if(!contactId||!sujet||!date){showToast('Champs obligatoires manquants','error');return;}
  const e={
    id:genId(),contactId,
    type:document.getElementById('em_type').value,
    date,
    auteur:document.getElementById('em_auteur').value,
    sujet,
    cc:document.getElementById('em_cc')?.value||'',
    corps:document.getElementById('em_corps').value
  };
  echanges.push(e);
  // Auto-update cf_last_date
  const cidx=contacts.findIndex(c=>c.id===contactId);
  if(cidx>=0){
    if(!contacts[cidx].commValues) contacts[cidx].commValues={};
    const prev=contacts[cidx].commValues['cf_last_date'];
    if(!prev||prev<date) contacts[cidx].commValues['cf_last_date']=date;
    await saveContacts();
  }
  await saveEchanges();
  showToast('Échange enregistré');
  closeModal();
  render();
}

async function deleteEchange(id) {
  if(!confirm('Supprimer cet échange ?')) return;
  echanges=echanges.filter(e=>e.id!==id);
  await saveEchanges();
  showToast('Échange supprimé');
  render();
}

      </table>
    </div>`;
}

// ─────────────────────────────────────────────
// CHAMPS COMMUNICATION PAGE
// ─────────────────────────────────────────────
function renderChampsComm() {
  document.getElementById('content').innerHTML=`
    <div style="margin-bottom:20px;padding:14px 18px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);">
      <div style="font-size:13px;color:var(--text);font-weight:500;margin-bottom:4px">Section Communication — champs par contact</div>
      <div style="font-size:12px;color:var(--text3)">Ces champs apparaissent sur chaque fiche contact dans l'onglet <strong style="color:var(--accent)">Communication</strong>. Les champs <span class="cf-fixed-badge">fixe</span> sont prédéfinis et non supprimables. Les 3 utilisateurs peuvent ajouter librement des champs personnalisés ici.</div>
    </div>
    <div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden">
      <div style="padding:11px 16px;background:var(--surface2);border-bottom:1px solid var(--border);display:grid;grid-template-columns:1fr 100px 80px 120px 60px;gap:12px;">
        <div style="font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--text3)">Label du champ</div>
        <div style="font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--text3)">Type</div>
        <div style="font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--text3)">Ajouté par</div>
        <div style="font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--text3)">Date</div>
        <div></div>
      </div>
      ${commFields.map(f=>`
        <div class="cf-item">
          <div class="cf-item-label">${f.label}${f.fixed?'<span class="cf-fixed-badge">fixe</span>':''}<div class="cf-item-meta">${f.desc||''}</div></div>
          <div style="min-width:100px;font-size:12px;color:var(--text2)">${{yesno:'OUI / NON',user:'Utilisateur',date:'Date',text:'Texte',number:'Nombre',url:'URL',select:'Liste'}[f.type]||f.type}</div>
          <div style="min-width:80px"><span class="tag-user tag-${f.auteur==='système'?'LDR':f.auteur}" style="${f.auteur==='système'?'background:var(--surface3);color:var(--text3);':''};width:auto;height:auto;padding:2px 8px;border-radius:4px;font-size:11px">${f.auteur}</span></div>
          <div style="min-width:120px;font-size:12px;color:var(--text3)">${fmtDate(f.date)}</div>
          <div>${f.fixed?'':'<button class="icon-btn" style="color:var(--danger)" onclick="deleteCommField(\''+f.id+'\')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/></svg></button>'}</div>
        </div>`).join('')}
    </div>`;
}

function openAddCommField() {
  const html=`
    <div class="modal-header">
      <h3>Ajouter un champ à la section Communication</h3>
      <button class="modal-close" onclick="closeModal()">×</button>
    </div>
    <div class="modal-body">
      <div style="margin-bottom:16px;padding:12px 14px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);font-size:12px;color:var(--text3)">
        Ce champ sera visible et renseignable sur <strong style="color:var(--text)">chaque fiche contact</strong> dans l'onglet Communication.
      </div>
      <div class="form-grid">
        <div class="field form-full"><label>Label du champ *</label><input id="ncf_label" placeholder="Ex : Filière agricole, Budget prévisionnel, Origine contact…"></div>
        <div class="field"><label>Type de saisie</label>
          <select id="ncf_type">
            <option value="text">Texte libre</option>
            <option value="yesno">OUI / NON</option>
            <option value="date">Date</option>
            <option value="number">Nombre</option>
            <option value="user">Utilisateur (LDR / JLE / AAU)</option>
            <option value="url">URL / Lien</option>
          </select>
        </div>
        <div class="field"><label>Description / aide (optionnel)</label><input id="ncf_desc" placeholder="Indication pour les utilisateurs"></div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal()">Annuler</button>
      <button class="btn btn-primary" onclick="saveCommField()">Ajouter le champ</button>
    </div>`;
  openModal(html);
}

async function saveCommField() {
  const label=document.getElementById('ncf_label').value.trim();
  if(!label){showToast('Label obligatoire','error');return;}
  const f={
    id:'cf_'+genId(),label,
    type:document.getElementById('ncf_type').value,
    desc:document.getElementById('ncf_desc').value,
    fixed:false,auteur:currentUser,
    date:new Date().toISOString().split('T')[0]
  };
  commFields.push(f);
  await saveCommFields();
  showToast('Champ ajouté');
  closeModal();
  renderChampsComm();
}

async function deleteCommField(id) {
  if(!confirm('Supprimer ce champ ? Les valeurs déjà saisies seront perdues.')) return;
  commFields=commFields.filter(f=>f.id!==id);
  await saveCommFields();
  showToast('Champ supprimé');
  renderChampsComm();
}

// ─────────────────────────────────────────────
// MODAL SYSTEM
// ─────────────────────────────────────────────
function openModal(html,extraClass) {
  document.getElementById('modal-container').innerHTML=`
    <div class="modal-backdrop" onclick="handleBackdropClick(event)">
      <div class="modal ${extraClass||''}" onclick="event.stopPropagation()">${html}</div>
    </div>`;
}
function handleBackdropClick(e){ if(e.target.classList.contains('modal-backdrop')) closeModal(); }
function closeModal(){ document.getElementById('modal-container').innerHTML=''; }
document.addEventListener('keydown',e=>{ if(e.key==='Escape') closeModal(); });

// ─────────────────────────────────────────────
// INIT
// ─────────────────────────────────────────────
async function init() { await loadData(); render(); }
init();
</script>
</body>
</html>
